---
# build da imagem e sobe os containers

- name: remove containers antigos se existirem
  shell: docker compose -f {{ projeto_dir }}/docker-compose.yml down 2>/dev/null || true
  changed_when: false

- name: build da imagem
  shell: docker build -t http-server-projeto-korp:latest {{ projeto_dir }}
  register: build_result
  changed_when: true

- name: mostra resultado do build
  debug:
    msg: "build feito com sucesso"
  when: build_result.rc == 0

- name: sobe os containers
  shell: docker compose -f {{ projeto_dir }}/docker-compose.yml up -d --no-build
  register: compose_result
  changed_when: true

- name: mostra resultado do compose
  debug:
    msg: "containers no ar"
  when: compose_result.rc == 0
